<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Internship - ITMS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
        .back-btn { background: #94a3b8; color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; box-sizing: border-box; }
        .btn-edit { background: #3b82f6; color: white; padding: 10px 20px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; margin-top: 10px; }
        .btn-edit:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Edit Internship</h2>
            <a href="{{ url_for('admin_internships') }}" class="back-btn">Cancel</a>
        </div>

        <form method="POST" action="{{ url_for('admin_internship_edit', id=internship.InternshipID) }}">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ internship.Title }}" required>
            </div>
            <div class="form-group">
                <label>Duration</label>
                <input type="text" name="duration" value="{{ internship.Duration }}">
            </div>
            <div class="form-group">
                <label>Stipend</label>
                <input type="number" step="0.01" name="stipend" value="{{ internship.Stipend }}">
            </div>
            <div class="form-group">
                <label>Company</label>
                <select name="company_id" required>
                    {% for comp in companies %}
                    <option value="{{ comp.CompanyID }}" {% if comp.CompanyID == internship.CompanyID %}selected{% endif %}>{{ comp.CompanyName }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Faculty</label>
                <select name="faculty_id" required>
                    {% for fac in faculties %}
                    <option value="{{ fac.FacultyID }}" {% if fac.FacultyID == internship.FacultyID %}selected{% endif %}>{{ fac.FacultyName }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-edit">Save Changes</button>
        </form>
    </div>
</body>
</html>
