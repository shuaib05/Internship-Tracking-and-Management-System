{% extends 'base.html' %}
{% block title %}Edit Internship - ITMS{% endblock %}
{% block content %}
<div class="header">
    <h2>Edit Internship</h2>
    <a href="{{ url_for('admin_internships') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-panel" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('admin_internship_edit', id=internship.InternshipID) }}">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ internship.Title }}" required>
        </div>
        <div class="form-group">
            <label>Duration</label>
            <input type="text" name="duration" value="{{ internship.Duration }}">
        </div>
        <div class="form-group">
            <label>Stipend</label>
            <input type="number" step="0.01" name="stipend" value="{{ internship.Stipend }}">
        </div>
        <div class="form-group">
            <label>Company</label>
            <select name="company_id" required>
                {% for comp in companies %}
                <option value="{{ comp.CompanyID }}" {% if comp.CompanyID == internship.CompanyID %}selected{% endif %}>{{ comp.CompanyName }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Faculty</label>
            <select name="faculty_id" required>
                {% for fac in faculties %}
                <option value="{{ fac.FacultyID }}" {% if fac.FacultyID == internship.FacultyID %}selected{% endif %}>{{ fac.FacultyName }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">Save Changes</button>
    </form>
</div>
{% endblock %}
