<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Students - ITMS</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 20px; }
        .back-btn { background: #94a3b8; color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Manage Students</h2>
            <a href="{{ url_for('admin_dashboard') }}" class="back-btn">Back to Dashboard</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.StudentID }}</td>
                    <td><b>{{ student.Name }}</b></td>
                    <td>{{ student.Email }}</td>
                    <td>{{ student.Phone }}</td>
                    <td>{{ student.DepartmentName }}</td>
                </tr>
                {% else %}
                <tr><td colspan="5">No students found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
