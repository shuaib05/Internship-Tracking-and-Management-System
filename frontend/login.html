{% extends 'base.html' %}
{% block title %}Login - ITMS{% endblock %}
{% block content %}
<div class="form-panel" style="max-width: 400px; margin: 40px auto; border-top: 4px solid var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    <h2 style="text-align: center; color: var(--primary); margin-bottom: 30px; margin-top: 0;">Sign In</h2>
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required placeholder="Enter username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px; padding: 14px; margin-top: 15px; font-weight: 700;">Login</button>
    </form>
</div>
{% endblock %}
