{% extends 'base.html' %}
{% block title %}Edit Company - ITMS{% endblock %}
{% block content %}
<div class="header">
    <h2>Edit Company</h2>
    <a href="{{ url_for('admin_companies') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-panel" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('admin_company_edit', id=company.CompanyID) }}">
        <div class="form-group">
            <label>Company Name</label>
            <input type="text" name="company_name" value="{{ company.CompanyName }}" required>
        </div>
        <div class="form-group">
            <label>Contact Email</label>
            <input type="email" name="contact_email" value="{{ company.ContactEmail }}" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" value="{{ company.Location }}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">Save Changes</button>
    </form>
</div>
{% endblock %}
