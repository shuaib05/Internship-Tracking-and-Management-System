{% extends 'base.html' %}
{% block title %}My Profile - ITMS{% endblock %}
{% block content %}
<div class="header">
    <h2>My Profile</h2>
    <a href="{{ url_for('student_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
</div>

<div class="form-panel" style="max-width: 600px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('student_profile') }}">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ student.Name }}" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" value="{{ student.Email }}" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone" value="{{ student.Phone }}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; font-size: 16px;">Update Profile</button>
    </form>
</div>
{% endblock %}
